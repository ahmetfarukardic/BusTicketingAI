<div class="min-h-screen bg-surface-ground flex flex-col font-sans text-slate-800">
  
  <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-200 h-auto md:h-20 py-3 md:py-0">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex flex-col md:flex-row justify-between items-center gap-4">
      
      <div class="flex items-center gap-3 shrink-0 w-full md:w-auto justify-between md:justify-start">
        <div class="flex items-center gap-3">
          <span class="text-xl md:text-2xl font-extrabold text-slate-800 tracking-tight">Firma Yönetimi</span>
        </div>
        
        <button class="md:hidden w-10 h-10 bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white rounded-xl flex items-center justify-center transition-colors border border-rose-200" (click)="logout()" title="Çıkış Yap">
          <i class="pi pi-sign-out"></i>
        </button>
      </div>

      <div class="flex items-center gap-2 overflow-x-auto no-scrollbar w-full md:w-auto pb-1 md:pb-0">
        <a routerLink="box-office" 
           routerLinkActive="!bg-brand !text-white shadow-md" 
           class="text-slate-500 hover:text-brand hover:bg-brand/5 font-bold text-sm px-4 py-2.5 rounded-xl transition-all whitespace-nowrap flex items-center gap-2">
          <i class="pi pi-ticket"></i> Gişe (Bilet Kesim)
        </a>
        
        <a routerLink="trips" 
           routerLinkActive="!bg-brand !text-white shadow-md" 
           class="text-slate-500 hover:text-brand hover:bg-brand/5 font-bold text-sm px-4 py-2.5 rounded-xl transition-all whitespace-nowrap flex items-center gap-2">
          <i class="pi pi-map"></i> Sefer Yönetimi
        </a>
        
        <a routerLink="fleet" 
           routerLinkActive="!bg-brand !text-white shadow-md" 
           class="text-slate-500 hover:text-brand hover:bg-brand/5 font-bold text-sm px-4 py-2.5 rounded-xl transition-all whitespace-nowrap flex items-center gap-2">
          <i class="pi pi-car"></i> Filo (Otobüsler)
        </a>
      </div>

      <div class="hidden md:flex shrink-0">
        <button 
          class="bg-rose-50 hover:bg-rose-500 text-rose-600 hover:text-white border border-rose-200 hover:border-rose-500 font-bold px-5 py-2.5 rounded-xl transition-all shadow-sm flex items-center gap-2 text-sm" 
          (click)="logout()">
          <span>Çıkış Yap</span> <i class="pi pi-sign-out"></i>
        </button>
      </div>

    </div>
  </nav>

  <main class="flex-1 w-full flex flex-col relative z-0">
    <router-outlet></router-outlet>
  </main>

</div>
