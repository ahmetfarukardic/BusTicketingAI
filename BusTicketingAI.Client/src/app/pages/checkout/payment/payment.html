<div class="p-6 md:p-8 border-2 border-dashed border-slate-200 rounded-3xl bg-white shadow-sm relative overflow-hidden">
  
  <i class="pi pi-credit-card absolute -bottom-10 -right-10 text-9xl text-slate-50 opacity-50 pointer-events-none"></i>

  <h3 class="text-xl font-bold text-slate-700 mb-6 flex items-center gap-2 border-b border-slate-100 pb-4">
    <i class="pi pi-credit-card text-brand"></i> Kart Bilgileri
  </h3>
      
  @if (totalPrice > 0) {
    <form [formGroup]="paymentForm" class="flex flex-col gap-5 relative z-10">
      
      <div class="flex flex-col">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1 ml-1">Kart Sahibinin Adı</label>
        <input pInputText formControlName="cardHolderName" placeholder="Ad Soyad" class="w-full p-3 font-medium text-slate-700 border-slate-300 rounded-xl focus:border-brand" />
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1 ml-1">Kart Numarası</label>
        <input pInputText formControlName="cardNumber" placeholder="0000 0000 0000 0000" maxlength="16" class="w-full p-3 font-medium text-slate-700 tracking-widest border-slate-300 rounded-xl focus:border-brand" />
      </div>
        
      <div class="flex gap-4">
        <div class="flex-1 flex flex-col">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1 ml-1">Son Kullanma</label>
          <input pInputText formControlName="expirationDate" placeholder="AA/YY" maxlength="5" (input)="formatExpirationDate($event)" class="w-full p-3 font-medium text-slate-700 text-center border-slate-300 rounded-xl focus:border-brand"/>
        </div>
        
        <div class="flex-1 flex flex-col">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1 ml-1">CVV Kodu</label>
          <div class="relative">
            <input pInputText formControlName="cvv" placeholder="123" maxlength="3" class="w-full p-3 font-medium text-slate-700 text-center border-slate-300 rounded-xl focus:border-brand" />
            <i class="pi pi-question-circle absolute right-3 top-1/2 -translate-y-1/2 text-slate-300" title="Kartınızın arkasındaki 3 haneli güvenlik kodu"></i>
          </div>
        </div>
      </div>

    </form>
  } @else {
    <div class="text-center py-10 px-4 bg-emerald-50 rounded-2xl border border-emerald-100 relative z-10">
      <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
        <i class="pi pi-check text-3xl text-emerald-600"></i>
      </div>
      <h3 class="text-lg font-extrabold text-emerald-800 mb-2">Bilet Ücreti Cüzdandan Karşılanacak</h3>
      <p class="text-emerald-600 font-medium text-sm">Kredi kartı bilgisi girmenize gerek yoktur. Bileti hemen onaylayabilirsiniz.</p>
    </div>
  }

  <div class="mt-8 relative z-10">
    <button 
      class="w-full py-4 rounded-xl font-bold text-lg transition-all shadow-md flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
      [ngClass]="totalPrice > 0 ? 'bg-brand hover:bg-brand-hover text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'"
      [disabled]="isLoading"
      (click)="submitOrder()">
      
      @if (isLoading) {
        <i class="pi pi-spin pi-spinner text-xl"></i> 
        <span>İşleminiz Yapılıyor...</span>
      } @else {
        <i class="pi text-xl" [ngClass]="totalPrice > 0 ? 'pi-lock' : 'pi-check-circle'"></i>
        <span>{{ totalPrice > 0 ? totalPrice + ' ₺ Ödemeyi Tamamla' : 'Bileti Onayla' }}</span>
      }
      
    </button>
    
    @if (totalPrice > 0) {
      <div class="flex items-center justify-center gap-4 mt-4 text-slate-300 text-2xl">
        <i class="pi pi-shield"></i>
        <span class="text-xs font-medium uppercase tracking-widest">256-Bit SSL Güvenli Ödeme</span>
      </div>
    }
  </div>

</div>
