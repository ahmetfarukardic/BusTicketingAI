<div class="login-container">
    <div class="login-card">
        <h2>Yeni Şifre Belirle</h2>
        <p class="subtitle">Lütfen hesabınız için yeni bir şifre girin.</p>
        
        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
            
            <div class="form-group">
                <label>Yeni Şifre</label>
                <input type="password" formControlName="newPassword" placeholder="En az 6 karakter">
                <small *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched" class="error-text">
                    Şifreniz en az 6 karakter olmalıdır.
                </small>
            </div>

            <div class="form-group">
                <label>Yeni Şifre (Tekrar)</label>
                <input type="password" formControlName="confirmPassword" placeholder="Şifrenizi doğrulayın">
                <small *ngIf="resetForm.errors?.['passwordMismatch'] && resetForm.get('confirmPassword')?.touched" class="error-text">
                    Şifreler birbiriyle eşleşmiyor.
                </small>
            </div>

            <button type="submit" [disabled]="resetForm.invalid || isLoading">
                {{ isLoading ? 'Güncelleniyor...' : 'Şifreyi Güncelle' }}
            </button>

        </form>
    </div>
</div>
